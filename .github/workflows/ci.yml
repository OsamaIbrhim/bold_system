name: CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: '30 1 * * *'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/bold
      DIRECT_URL: postgresql://user:password@localhost:5432/bold
      JWT_SECRET: ci-only-secret-that-is-longer-than-thirty-two-characters
      PRICE_SNAPSHOT_KEYS: price-ci-202607=8a93d2f15b7c4e609d2a8f3c6e1b75049c2d8e6f1a7b3905d4c8e2f6a1b7d903
      POS_OFFLINE_TICKET_KEYS: offline-ci-202607=4f7b1d8e93c2a6507d4e9f1b6c8a3052e7d9b4f1c6a8e2035d7f9b2c4a6e8013
      POS_OFFLINE_TICKET_TTL_MS: 86400000
      POS_OFFLINE_CLOCK_SKEW_MS: 300000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma validate
      - run: npm run test:soft
      - run: npm audit --audit-level=high

  migration-gate:
    name: migration-gate
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bold_migrations
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bold_migrations"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      JWT_SECRET: ci-only-secret-that-is-longer-than-thirty-two-characters
      PRICE_SNAPSHOT_KEYS: price-ci-202607=8a93d2f15b7c4e609d2a8f3c6e1b75049c2d8e6f1a7b3905d4c8e2f6a1b7d903
      POS_OFFLINE_TICKET_KEYS: offline-ci-202607=4f7b1d8e93c2a6507d4e9f1b6c8a3052e7d9b4f1c6a8e2035d7f9b2c4a6e8013
      ALLOW_DEVELOPMENT_ACCOUNTING_RESET: reset-development-accounting
      ALLOW_REMOTE_DEVELOPMENT_ACCOUNTING_RESET: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Create isolated migration databases
        env:
          PGPASSWORD: postgres
        run: |
          for database in \
            bold_migrations_clean \
            bold_migrations_clean_shadow \
            bold_migrations_upgrade \
            bold_migrations_upgrade_shadow
          do
            createdb \
              --host localhost \
              --username postgres \
              "$database"
          done
      - name: Resolve exact migration baselines
        id: refs
        env:
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          base_sha="$EVENT_BASE_SHA"
          if [ -z "$base_sha" ] || [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then
            base_sha="$(git rev-parse HEAD^)"
          fi
          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
      - name: Enforce immutable forward-only migrations
        id: policy
        run: >-
          npm run prisma:migrations:policy --
          --base "${{ steps.refs.outputs.base_sha }}"
          --github-output "$GITHUB_OUTPUT"
      - name: Apply current migrations to a clean database twice
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bold_migrations_clean
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/bold_migrations_clean
          SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bold_migrations_clean_shadow
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx prisma migrate deploy
          npx prisma migrate status
          npx prisma migrate diff --exit-code \
            --from-migrations prisma/migrations \
            --to-url "$DIRECT_URL" \
            --shadow-database-url "$SHADOW_DATABASE_URL"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.policy.outputs.upgrade_ref }}
          path: migration-base
      - name: Build a populated database from the release baseline
        working-directory: migration-base/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bold_migrations_upgrade
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/bold_migrations_upgrade
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npm run prisma:seed
      - name: Upgrade populated release data with current migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bold_migrations_upgrade
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/bold_migrations_upgrade
          SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bold_migrations_upgrade_shadow
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx prisma migrate deploy
          npx prisma migrate status
          npx prisma migrate diff --exit-code \
            --from-migrations prisma/migrations \
            --to-url "$DIRECT_URL" \
            --shadow-database-url "$SHADOW_DATABASE_URL"

  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11
          cache: npm
          cache-dependency-path: admin-web/package-lock.json
      - run: npm ci
      - run: npm run test:soft
      - run: npm audit --omit=dev --audit-level=high

  pos:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pos-electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11
          cache: npm
          cache-dependency-path: pos-electron/package-lock.json
      - run: npm ci
      - run: npm run test:soft
      - run: npm audit --omit=dev --audit-level=high

  hard-smoke:
    needs: migration-gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bold_perf
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bold_perf"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bold_perf
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/bold_perf
      JWT_SECRET: ci-only-secret-that-is-longer-than-thirty-two-characters
      PRICE_SNAPSHOT_KEYS: price-ci-202607=8a93d2f15b7c4e609d2a8f3c6e1b75049c2d8e6f1a7b3905d4c8e2f6a1b7d903
      POS_OFFLINE_TICKET_KEYS: offline-ci-202607=4f7b1d8e93c2a6507d4e9f1b6c8a3052e7d9b4f1c6a8e2035d7f9b2c4a6e8013
      POS_OFFLINE_TICKET_TTL_MS: 86400000
      POS_OFFLINE_CLOCK_SKEW_MS: 300000
      ALLOW_DEVELOPMENT_ACCOUNTING_RESET: reset-development-accounting
      PERF_LOGIN_PHONE: "+200100000000"
      PERF_LOGIN_PASSWORD: Bold1234
      PERF_SMOKE: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run prisma:seed
      - run: npm run build
      - name: Start API
        run: |
          npm run start:prod > /tmp/bold-api.log 2>&1 &
          for attempt in {1..30}; do
            curl --silent --fail http://localhost:3000/api/v1/health/ready >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/bold-api.log
          exit 1
      - run: npm run test:hard:smoke

  release-gate:
    name: release-gate
    if: always() && github.event_name != 'schedule'
    needs:
      - backend
      - migration-gate
      - admin
      - pos
      - hard-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Require every production gate
        env:
          BACKEND_RESULT: ${{ needs.backend.result }}
          MIGRATION_RESULT: ${{ needs.migration-gate.result }}
          ADMIN_RESULT: ${{ needs.admin.result }}
          POS_RESULT: ${{ needs.pos.result }}
          HARD_SMOKE_RESULT: ${{ needs.hard-smoke.result }}
        run: |
          test "$BACKEND_RESULT" = "success"
          test "$MIGRATION_RESULT" = "success"
          test "$ADMIN_RESULT" = "success"
          test "$POS_RESULT" = "success"
          test "$HARD_SMOKE_RESULT" = "success"

  hard-load:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bold_perf
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bold_perf"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bold_perf
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/bold_perf
      JWT_SECRET: ci-only-secret-that-is-longer-than-thirty-two-characters
      PRICE_SNAPSHOT_KEYS: price-ci-202607=8a93d2f15b7c4e609d2a8f3c6e1b75049c2d8e6f1a7b3905d4c8e2f6a1b7d903
      POS_OFFLINE_TICKET_KEYS: offline-ci-202607=4f7b1d8e93c2a6507d4e9f1b6c8a3052e7d9b4f1c6a8e2035d7f9b2c4a6e8013
      POS_OFFLINE_TICKET_TTL_MS: 86400000
      POS_OFFLINE_CLOCK_SKEW_MS: 300000
      ALLOW_DEVELOPMENT_ACCOUNTING_RESET: reset-development-accounting
      PERF_LOGIN_PHONE: "+200100000000"
      PERF_LOGIN_PASSWORD: Bold1234
      PERF_CONCURRENCY: 25
      PERF_REQUESTS_PER_WORKER: 20
      PERF_READ_P95_MS: 300
      PERF_PRODUCTS: 10000
      PERF_INVOICES: 50000
      PERF_MUTATIONS: 1
      PERF_SALES: 100
      PERF_SALE_P95_MS: 500
      PERF_CASHIER_PHONE: "+200100000002"
      PERF_CASHIER_PASSWORD: Bold1234
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run prisma:seed
      - run: npm run perf:seed
      - run: npm run build
      - name: Start API
        run: |
          npm run start:prod > /tmp/bold-api.log 2>&1 &
          for attempt in {1..30}; do
            curl --silent --fail http://localhost:3000/api/v1/health/ready >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/bold-api.log
          exit 1
      - run: npm run test:hard
