name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/bold
      DIRECT_URL: postgresql://user:password@localhost:5432/bold
      JWT_SECRET: ci-only-secret-that-is-longer-than-thirty-two-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma validate
      - run: npm test -- --runInBand
      - run: npm run build
      - run: npm audit --audit-level=high

  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11
          cache: npm
          cache-dependency-path: admin-web/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  pos:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pos-electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11
          cache: npm
          cache-dependency-path: pos-electron/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high
